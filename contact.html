<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Form</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="containerc">
      <div class="section-onec">
        <h1 class="section-onec__title">Ajas Salah</h1>
        <p class="section-onec__descrip">Web Developer</p>
        <a class="section-onec--descrip" href="index.html">Home</a>
      </div>

      <div class="section-twoc">
        <form class="section-twoc__form">
          <table class="section-twoc__table">
            <tr>
              <td><label class="section-twoc__lbl">Name:</label></td>
              <td>
                <input
                  class="section-twoc__txtbox"
                  type="text"
                  placeholder="Enter your name"
                />
              </td>
            </tr>
            <tr>
              <td><label class="section-twoc__lbl">Email:</label></td>
              <td>
                <input
                  class="section-twoc__txtbox"
                  type="email"
                  placeholder="Enter your email"
                />
              </td>
            </tr>
            <tr>
              <td><label class="section-twoc__lbl">Message:</label></td>
              <td>
                <textarea
                  class="section-twoc__txtara"
                  placeholder="Enter your message"
                ></textarea>
              </td>
            </tr>
            <tr>
              <td></td>
              <td>
                <button class="section-twoc__button">submit</button>
              </td>
            </tr>
          </table>
        </form>
      </div>

      <div class="section-threec">
        <p class="section-threec__descript">
          Social Media: <a href="https://twitter.com">Twitter</a> |
          <a href="https://facebook.com">Facebook</a> |
          <a href="https://linkedin.com">LinkedIn</a>
        </p>
        <p class="section-threec--descript">&copy; Ajas Salah</p>
      </div>
    </div>
  </body>
</html>
